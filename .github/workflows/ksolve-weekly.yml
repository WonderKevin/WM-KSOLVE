name: K-Solve Weekly Automation

on:
  schedule:
    - cron: "0 17 * * 0"
  workflow_dispatch:
    inputs:
      startDate:
        description: "Manual start date YYYY-MM-DD"
        required: false
        type: string
      endDate:
        description: "Manual end date YYYY-MM-DD"
        required: false
        type: string
      includeInvoiceSummary:
        description: "Include invoice summary"
        required: false
        default: "true"
        type: string
      includeInvoiceFiles:
        description: "Include invoice files"
        required: false
        default: "true"
        type: string

jobs:
  run-ksolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run K-Solve worker
        run: npx tsx scripts/ksolve-worker.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          KSOLVE_USERNAME: ${{ secrets.KSOLVE_USERNAME }}
          KSOLVE_PASSWORD: ${{ secrets.KSOLVE_PASSWORD }}
          KSOLVE_START_DATE: ${{ github.event.inputs.startDate }}
          KSOLVE_END_DATE: ${{ github.event.inputs.endDate }}
          KSOLVE_INCLUDE_INVOICE_SUMMARY: ${{ github.event.inputs.includeInvoiceSummary }}
          KSOLVE_INCLUDE_INVOICE_FILES: ${{ github.event.inputs.includeInvoiceFiles }}