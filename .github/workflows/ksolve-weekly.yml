name: K-Solve Weekly Automation

on:
  schedule:
    # Monday 1:00 AM Philippines time = Sunday 5:00 PM UTC
    - cron: "0 17 * * 0"
  workflow_dispatch:

jobs:
  run-ksolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run K-Solve worker
        run: npx tsx scripts/ksolve-worker.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          KSOLVE_BEARER_TOKEN: ${{ secrets.KSOLVE_BEARER_TOKEN }}
          KSOLVE_COOKIE: ${{ secrets.KSOLVE_COOKIE }}
