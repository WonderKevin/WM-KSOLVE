name: K-Solve Scheduled Invoice File

on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch:

jobs:
  run-ksolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run K-Solve worker
        run: npx tsx scripts/ksolve-worker.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          KSOLVE_USERNAME: ${{ secrets.KSOLVE_USERNAME }}
          KSOLVE_PASSWORD: ${{ secrets.KSOLVE_PASSWORD }}
          KSOLVE_INCLUDE_INVOICE_SUMMARY: "false"
          KSOLVE_INCLUDE_INVOICE_FILES: "true"
          KSOLVE_FETCH_TIMEOUT_MS: "60000"
          KSOLVE_FETCH_RETRIES: "5"
          KSOLVE_RETRY_DELAY_MS: "10000"
